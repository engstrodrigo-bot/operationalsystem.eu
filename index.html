<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration des Services Opérationnels</title>
    <style>
        :root {
            --belgian-blue: #2c5e9e;
            --light-gray: #f4f7f9;
            --border-color: #d1d9e0;
            --text-dark: #333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }
        /* Barra Superior Estilo Oficial */
        .header {
            background-color: var(--belgian-blue);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h2 {
            font-size: 18px;
            color: #444;
            border-bottom: 2px solid var(--belgian-blue);
            padding-bottom: 8px;
        }
        .form-group {
            background: var(--light-gray);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-primary {
            background-color: #5cb85c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
            font-size: 12px;
        }
        .btn-primary:hover { background-color: #449d44; }
        
        /* Tabela de Logs Estilo Imagem WhatsApp */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 20px;
        }
        th {
            background-color: #e9eef2;
            text-align: left;
            padding: 10px;
            border: 1px solid var(--border-color);
            color: #555;
        }
        td {
            padding: 10px;
            border: 1px solid var(--border-color);
            background-color: #fff;
        }
        .status-ok { color: #27ae60; font-weight: bold; }
        .action-link {
            display: inline-block;
            background: var(--belgian-blue);
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 3px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="header">
    <span>SYSTEME D'ENREGISTREMENT | ADMINISTRATION</span>
    <span>ID: 291478 | français (fr)</span>
</div>

<div class="container">
    <h2>Configuration de la Localisation Opérationnelle</h2>
    
    <div class="form-group">
        <label>Saisissez l'adresse de l'intervention (Belgique):</label>
        <input type="text" id="setor" placeholder="Ex: Rue de la Loi 16, Bruxelles">
        <button class="btn-primary" onclick="executarSinc()">Rechercher Coordonnées</button>
    </div>

    <div id="result-area" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>LOCALISATION</th>
                    <th>COORDONNÉES</th>
                    <th>ÉTAT</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="local-nome">---</td>
                    <td id="coords-val">---</td>
                    <td class="status-ok">VÉRIFIÉ</td>
                    <td><a id="gpsLink" href="#" class="action-link">INJECTER GPS</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function executarSinc() {
        const endereco = document.getElementById('setor').value;
        if(!endereco) return;

        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if(data && data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;
                
                document.getElementById('local-nome').innerText = data[0].display_name.split(',')[0];
                document.getElementById('coords-val').innerText = lat + ", " + lon;
                document.getElementById('gpsLink').href = `geo:${lat},${lon}?q=${lat},${lon}&z=18`;
                
                document.getElementById('result-area').style.display = 'block';
            } else {
                alert("Erreur: Adresse non trouvée.");
            }
        } catch (error) {
            alert("Erreur de réseau.");
        }
    }
</script>

</body>
</html>
