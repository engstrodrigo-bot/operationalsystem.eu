<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration des Services Opérationnels</title>
    <style>
        :root {
            --belgian-blue: #2c5e9e;
            --light-gray: #f4f7f9;
            --border-color: #d1d9e0;
            --text-dark: #333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: var(--belgian-blue);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h2 {
            font-size: 18px;
            color: #444;
            border-bottom: 2px solid var(--belgian-blue);
            padding-bottom: 8px;
        }
        .form-group {
            background: var(--light-gray);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-primary {
            background-color: #5cb85c;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
            font-size: 12px;
            width: 100%;
        }
        .btn-primary:hover { background-color: #449d44; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 20px;
            display: none; /* Escondido até a busca ser feita */
        }
        th {
            background-color: #e9eef2;
            text-align: left;
            padding: 10px;
            border: 1px solid var(--border-color);
            color: #555;
        }
        td {
            padding: 10px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            text-align: left;
        }
        .status-ok { color: #27ae60; font-weight: bold; }
        .action-link {
            display: inline-block;
            background: var(--belgian-blue);
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <span>SYSTEME D'ENREGISTREMENT | ADMINISTRATION</span>
    <span>ID: 291478 | français (fr)</span>
</div>

<div class="container">
    <h2>Configuration de la Localisation Opérationnelle</h2>
    
    <div class="form-group">
        <label>Saisissez l'adresse de l'intervention (Belgique):</label>
        <input type="text" id="setor" placeholder="Ex: Rue de la Loi 16, Bruxelles">
        <button class="btn-primary" onclick="executarSinc()">Rechercher Coordonnées</button>
    </div>

    <table id="result-area">
        <thead>
            <tr>
                <th>LOCALISATION</th>
                <th>COORDONNÉES</th>
                <th>ÉTAT</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="local-nome">---</td>
                <td id="coords-val">---</td>
                <td class="status-ok">VÉRIFIÉ</td>
                <td><a id="gpsLink" href="#" class="action-link">INJECTER GPS</a></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
async function executarSinc() {
    const query = document.getElementById('setor').value;
    if(!query) return;

    try {
        // Busca focada na Bélgica para evitar erros de endereços globais
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}, Belgium`;
        const response = await fetch(url);
        const data = await response.json();
        
        if(data && data.length > 0) {
            const lat = data[0].lat;
            const lon = data[0].lon;
            
            // Força o padrão internacional (ponto) e precisão de 6 casas decimais
            const latFixa = parseFloat(lat).toFixed(6);
            const lonFixa = parseFloat(lon).toFixed(6);

            // Extrai apenas o nome principal do local
            const shortName = data[0].display_name.split(',')[0];
            
            // Atualiza os campos na tabela
            document.getElementById('local-nome').innerText = shortName;
            document.getElementById('coords-val').innerText = latFixa + ", " + lonFixa;
            
            // Configura o link GEO para o Mock Location do Android
            const linkGps = document.getElementById('gpsLink');
            linkGps.href = `geo:${latFixa},${lonFixa}?q=${latFixa},${lonFixa}&z=19`;
            
            // Mostra a tabela de resultados
            document.getElementById('result-area').style.display = 'table';
            
        } else {
            alert("Erreur: Emplacement introuvable. Vérifiez l'adresse.");
        }
    } catch (e) {
        alert("Erreur de connexion au serveur opérationnel.");
    }
}
</script>

</body>
</html>
