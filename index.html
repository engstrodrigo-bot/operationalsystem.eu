<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité Sociale | Portail d'Administration</title>
    
    <style>
        /* CSS UNIFICADO E OTIMIZADO */
        @font-face {
            font-family: 'Source Code Pro';
            font-weight: 400 600;
            font-display: swap;
            src: url('https://fonts.gstatic.com/s/sourcecodepro/v31/HI_SiYsKILxRpg3hIP6sJ7fM7PqlPevW.woff2') format('woff2');
            unicode-range: U+0000-00FF;
        }

        @font-face {
            font-family: 'Source Sans 3';
            font-weight: 300 700;
            font-display: swap;
            src: url('https://fonts.gstatic.com/s/sourcesans3/v19/nwpStKy2OAdR1K-IwhWudF-R3w8aZQ.woff2') format('woff2');
            unicode-range: U+0000-00FF;
        }

        :root {
            --belgian-blue: #2c5e9e;
            --success-green: #5cb85c;
            --border: #d1d9e0;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            margin: 0;
            background-color: #fff;
        }

        /* HEADER ESTILO OFICIAL BELGA */
        .header {
            background-color: var(--belgian-blue);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        .container { padding: 20px; max-width: 900px; margin: auto; }

        /* TABELA IDENTICA À FOTO */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 20px;
        }

        th {
            background-color: #e9eef2;
            border: 1px solid var(--border);
            padding: 10px;
            text-align: left;
            color: #555;
            text-transform: uppercase;
        }

        td {
            border: 1px solid var(--border);
            padding: 10px;
            font-family: 'Source Code Pro', monospace;
        }

        .btn-inject {
            background: var(--belgian-blue);
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 3px;
            font-weight: bold;
            font-size: 11px;
        }

        .form-card {
            background: #f4f7f9;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        button {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <span>SYSTÈME D'ENREGISTREMENT | BELGIQUE</span>
    <span id="user-display">Non connecté</span>
</div>

<div class="container">
    <!-- TELA DE LOGIN / CADASTRO -->
    <div id="auth-section" class="form-card">
        <h3>Enregistrement du Profil</h3>
        <input type="text" id="reg-nome" placeholder="Nom Complet">
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-pass" placeholder="Mot de passe">
        <input type="text" id="reg-addr" placeholder="Adresse du chantier (Ex: Brusselsesteenweg 69)">
        <button onclick="salvarPerfil()">CONFIGURER ET ACCÉDER</button>
    </div>

    <!-- DASHBOARD APÓS LOGIN -->
    <div id="main-dashboard" class="hidden">
        <h3>Gestion de la Localisation</h3>
        <div class="form-card">
            <p><strong>Lieu de travail:</strong> <span id="saved-addr">---</span></p>
            <button onclick="executarSincronismo()" style="background: var(--belgian-blue);">AUTOMATISER LOCALISATION</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>DATE</th>
                    <th>DÉBUT</th>
                    <th>TERMINÉ</th>
                    <th>LOCALISATION</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="log-body">
                <!-- Registros automatizados aparecerão aqui -->
            </tbody>
        </table>
    </div>
</div>

<script>
    function salvarPerfil() {
        const perfil = {
            nome: document.getElementById('reg-nome').value,
            addr: document.getElementById('reg-addr').value
        };
        localStorage.setItem('perfil_belga', JSON.stringify(perfil));
        abrirDashboard();
    }

    function abrirDashboard() {
        const dados = JSON.parse(localStorage.getItem('perfil_belga'));
        if(dados) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = dados.nome + " | français (fr)";
            document.getElementById('saved-addr').innerText = dados.addr;
        }
    }

    async function executarSincronismo() {
        const dados = JSON.parse(localStorage.getItem('perfil_belga'));
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dados.addr)}, Belgium`;
        
        try {
            const resp = await fetch(url);
            const res = await resp.json();
            if(res.length > 0) {
                const lat = parseFloat(res[0].lat).toFixed(6);
                const lon = parseFloat(res[0].lon).toFixed(6);
                const dataAtual = new Date().toLocaleDateString('fr-BE');

                const row = `<tr>
                    <td>${dataAtual}</td>
                    <td>09:30</td>
                    <td>18:00</td>
                    <td>${lat}, ${lon}</td>
                    <td><a href="geo:${lat},${lon}?q=${lat},${lon}&z=19" class="btn-inject">INJECTER GPS</a></td>
                </tr>`;
                document.getElementById('log-body').innerHTML = row;
            }
        } catch (e) { alert("Erreur de connexion"); }
    }

    // Verifica login ao carregar
    window.onload = abrirDashboard;
</script>

</body>
</html>
